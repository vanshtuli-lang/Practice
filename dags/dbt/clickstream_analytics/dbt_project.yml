##############################################################################
# dbt_project.yml — clickstream_analytics
#
# This dbt project transforms raw clickstream orders (S3 to Snowflake) into a
# per-customer metrics mart.  Orchestrated by Astronomer Cosmos inside the
# s3_to_snowflake_dbt Airflow DAG.
#
# Profile credentials are NOT stored here.  Cosmos generates the runtime
# profile from the `snowflake` Airflow connection via
# SnowflakeUserPasswordProfileMapping.
##############################################################################

name: "clickstream_analytics"
version: "1.0.0"
config-version: 2

# Profile name must match the profile_name set in the Cosmos ProfileConfig.
profile: "clickstream_analytics"

# Standard dbt path configuration.
model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# staging is ephemeral so dbt never creates a view object in Snowflake —
# the CTE gets inlined directly into the mart query. This avoids needing
# CREATE VIEW privilege.
# marts uses incremental so dbt runs a MERGE on the pre-existing table
# instead of CREATE OR REPLACE TABLE. Only needs INSERT + UPDATE.
models:
  clickstream_analytics:
    staging:
      +materialized: ephemeral
    marts:
      +materialized: incremental
